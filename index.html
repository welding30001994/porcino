<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heydin Kayser · Fibonacci Quant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 20%, #0f1a2f, #030514);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background: rgba(0, 8, 18, 0.8);
            backdrop-filter: blur(18px);
            border: 2px solid #ff44ff;
            border-radius: 3.5rem 3.5rem 2.5rem 2.5rem;
            padding: 2rem 2rem 2.5rem;
            box-shadow: 0 30px 60px #ff00ff40, 0 0 0 3px #00ffff inset;
        }

        /* header con nombre llamativo */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            border-bottom: 4px solid #ff66ff;
            padding-bottom: 1rem;
        }

        .title h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(45deg, #ffffff, #ffa0ff, #a0ffff, #ffffff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px #ff00ff, 0 0 60px cyan;
            letter-spacing: 2px;
        }

        .title span {
            font-size: 1.2rem;
            color: #fff;
            background: #ff0080;
            padding: 0.3rem 1.5rem;
            border-radius: 40px;
            border: 2px solid cyan;
            box-shadow: 0 0 30px magenta;
        }

        /* panel de entrada */
        .input-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            background: #021627f0;
            border-radius: 50px;
            padding: 2rem;
            border: 3px solid #ff88ff;
            margin-bottom: 2.5rem;
            justify-content: center;
            box-shadow: 0 0 40px #ff40ff, inset 0 0 20px #00ffff;
        }

        .input-group {
            flex: 1 1 200px;
        }

        .input-group label {
            display: block;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
            text-shadow: 0 0 10px magenta;
        }

        .input-group input {
            width: 100%;
            background: #010e1a;
            border: 3px solid #00ffff;
            border-radius: 40px;
            padding: 16px 22px;
            font-size: 1.6rem;
            font-weight: 600;
            color: white;
            outline: none;
            box-shadow: 0 0 30px cyan, inset 0 0 10px black;
        }

        .input-group input:focus {
            border-color: #ff55ff;
            box-shadow: 0 0 50px #ff00ff;
        }

        .direction-buttons {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .dir-btn {
            background: #1f1f3f;
            border: 3px solid #00ffff;
            border-radius: 50px;
            padding: 16px 30px;
            font-size: 1.8rem;
            font-weight: 800;
            color: white;
            cursor: pointer;
            transition: 0.1s;
            text-transform: uppercase;
            text-shadow: 0 0 15px cyan;
            box-shadow: 0 0 30px #00ffff;
        }

        .dir-btn.active {
            background: linear-gradient(145deg, #ff00ff, #aa00aa);
            border-color: #ffffff;
            box-shadow: 0 0 70px #ff80ff, 0 0 30px white;
            color: white;
            transform: scale(1.05);
        }

        #btnBuy.active {
            background: linear-gradient(145deg, #00ffaa, #0088aa);
            border-color: white;
        }

        #btnSell.active {
            background: linear-gradient(145deg, #ff66aa, #cc00aa);
        }

        .calc-btn {
            background: linear-gradient(145deg, #ffcc00, #ff8800);
            border: none;
            border-radius: 60px;
            padding: 0 3rem;
            font-size: 1.8rem;
            font-weight: 800;
            color: #000;
            text-transform: uppercase;
            border: 3px solid white;
            box-shadow: 0 0 60px orange, 0 8px 0 #884400;
            cursor: pointer;
            height: 70px;
        }

        /* panel de señal */
        .signal-flash {
            background: #001d30;
            border-radius: 60px;
            padding: 1.5rem 2rem;
            margin: 1.5rem 0;
            border: 4px solid #ff66ff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 0 60px magenta;
        }

        .direction-badge {
            font-size: 2.5rem;
            font-weight: 800;
            background: #000814;
            padding: 0.5rem 3rem;
            border-radius: 60px;
            border: 4px solid cyan;
            color: white;
            text-shadow: 0 0 30px cyan;
        }

        .price-highlight {
            display: flex;
            gap: 30px;
            font-size: 1.8rem;
        }

        .price-highlight div {
            background: #001f33;
            padding: 0.5rem 2rem;
            border-radius: 40px;
            border: 3px solid gold;
            color: white;
            font-weight: 600;
            text-shadow: 0 0 20px gold;
        }

        /* GRID DESCENDENTE - ORDEN VENTA (de 0 a 261.8) */
        .fibo-grid-desc {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 20px;
            margin: 2rem 0;
        }

        /* tarjetas */
        .fibo-card {
            background: linear-gradient(145deg, #061c2c, #02121f);
            border: 3px solid #00ffff;
            border-radius: 30px;
            padding: 1.5rem 0.5rem;
            text-align: center;
            box-shadow: 0 12px 0 #005577, 0 0 60px #00ffff80;
            transition: 0.1s;
        }

        .fibo-card:hover {
            transform: scale(1.03);
            border-color: #ff55ff;
            box-shadow: 0 0 90px #ff80ff, 0 10px 0 #aa00aa;
        }

        .fibo-label {
            font-size: 1.4rem;
            font-weight: 700;
            background: #003f66;
            display: inline-block;
            padding: 10px 30px;
            border-radius: 40px;
            border: 2px solid white;
            color: white;
            text-shadow: 0 0 20px cyan;
            margin-bottom: 15px;
        }

        .fibo-value {
            font-size: 2rem;
            font-weight: 800;
            color: white !important;  /* forzado blanco */
            text-shadow: 0 0 30px cyan, 0 0 60px magenta;
            margin: 15px 0;
            letter-spacing: -0.5px;
        }

        .zone-tag {
            font-size: 1rem;
            background: #102f40;
            padding: 10px;
            border-radius: 40px;
            border: 2px solid #ffaa00;
            color: #ffffdd;
            font-weight: 600;
            text-shadow: 0 0 10px orange;
        }

        /* panel de selección */
        .selection-zone {
            background: #011d2f;
            border-radius: 60px;
            padding: 1.8rem;
            margin: 2rem 0;
            border: 4px solid #ff44ff;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 0 50px magenta;
        }

        .selected-box {
            display: flex;
            gap: 30px;
            font-size: 1.4rem;
            color: white;
        }

        .selected-item {
            background: #002b44;
            padding: 12px 30px;
            border-radius: 50px;
            border: 3px solid cyan;
            font-weight: 700;
            text-shadow: 0 0 15px cyan;
        }

        .apply-btn {
            background: linear-gradient(145deg, #ff00aa, #990066);
            border: none;
            border-radius: 60px;
            padding: 16px 40px;
            font-size: 1.6rem;
            font-weight: 800;
            color: white;
            border: 4px solid white;
            box-shadow: 0 0 70px #ff66cc;
            cursor: pointer;
        }

        .recursive-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .result-card {
            background: #042433;
            border-radius: 30px;
            padding: 1rem 0.5rem;
            border: 3px solid cyan;
            text-align: center;
            color: white;
            box-shadow: 0 0 40px cyan;
        }

        .footnote {
            color: #b0d0ff;
            text-align: center;
            margin-top: 30px;
            font-size: 1rem;
            border-top: 3px dashed #ff66ff;
            padding-top: 20px;
            text-shadow: 0 0 10px magenta;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="title">
            <h1>HEYDIN KAYSER</h1>
            <span>FIBO·VISION</span>
        </div>
    </div>

    <!-- panel de entrada -->
    <div class="input-panel">
        <div class="input-group">
            <label>🔺 MAX</label>
            <input type="number" id="maxInput" step="0.01" value="71312.32">
        </div>
        <div class="input-group">
            <label>🔻 MIN</label>
            <input type="number" id="minInput" step="0.01" value="70293.38">
        </div>
        <div class="direction-buttons">
            <button class="dir-btn" id="btnBuy">BUY</button>
            <button class="dir-btn active" id="btnSell">SELL</button>
        </div>
        <button class="calc-btn" id="calcMain">⟳</button>
    </div>

    <!-- señal -->
    <div class="signal-flash" id="signalMain">
        <div class="direction-badge" id="mainDirection">SELL</div>
        <div class="price-highlight">
            <div id="price50">50% 70802.85</div>
            <div id="price618">61.8% 70682.57</div>
        </div>
    </div>

    <!-- grid descendente (orden venta) se llena con JS -->
    <div class="fibo-grid-desc" id="fiboGrid"></div>

    <!-- panel selección dos niveles -->
    <div class="selection-zone">
        <div class="selected-box">
            <div class="selected-item" id="selectedFirst">—</div>
            <div class="selected-item" id="selectedSecond">—</div>
        </div>
        <button class="apply-btn" id="applySelectionBtn">🔄 NUEVO FIBO</button>
    </div>

    <!-- resultados recursivos -->
    <div id="recursiveContainer">
        <h3 style="color:white; text-shadow:0 0 20px magenta; margin-bottom:1rem;">⚡ NUEVA SECUENCIA FIBONACCI</h3>
        <div class="recursive-grid" id="recursiveLevels"></div>
    </div>

    <div class="footnote">
        ★ SELECCIONA DOS TARJETAS PARA GENERAR NUEVO RANGO ★
    </div>
</div>

<script>
    (function() {
        // orden fijo: descendente (0,23.6,38.2,50,61.8,75,100,161.8,261.8)
        const FIB_LEVELS = [0, 23.6, 38.2, 50, 61.8, 75, 100, 161.8, 261.8];
        
        const maxInput = document.getElementById('maxInput');
        const minInput = document.getElementById('minInput');
        const btnBuy = document.getElementById('btnBuy');
        const btnSell = document.getElementById('btnSell');
        const calcMain = document.getElementById('calcMain');
        const fiboGrid = document.getElementById('fiboGrid');
        const selectedFirst = document.getElementById('selectedFirst');
        const selectedSecond = document.getElementById('selectedSecond');
        const applyBtn = document.getElementById('applySelectionBtn');
        const recursiveLevelsDiv = document.getElementById('recursiveLevels');
        const mainDirection = document.getElementById('mainDirection');
        const price50 = document.getElementById('price50');
        const price618 = document.getElementById('price618');

        let currentDirection = 'SELL'; // por defecto SELL activo
        let selectedCards = []; // guardar índices
        let currentLevels = [];  // guardar objetos {pct, value}

        // dirección visual
        function setDirection(dir) {
            if (dir === 'BUY') {
                btnBuy.classList.add('active');
                btnSell.classList.remove('active');
                currentDirection = 'BUY';
            } else {
                btnSell.classList.add('active');
                btnBuy.classList.remove('active');
                currentDirection = 'SELL';
            }
            mainDirection.innerText = currentDirection;
            computeAndRender(); // recalcular con nueva dirección
        }

        btnBuy.addEventListener('click', () => setDirection('BUY'));
        btnSell.addEventListener('click', () => setDirection('SELL'));

        // obtener etiqueta
        function getZoneLabel(pct, dir) {
            if (pct === 50) return '⚖️ NEUTRAL';
            if (pct === 61.8) return dir === 'BUY' ? '🟢 ENTRADA BUY' : '🔻 ENTRADA SELL';
            if (pct === 38.2) return '⚠️ REBOTE';
            if (pct === 75) return '🧊 SOP/RES';
            if (pct === 23.6) return '🌊 INICIO';
            if (pct === 100) return '🎯 100%';
            if (pct === 161.8 || pct === 261.8) return '🚀 EXTENSIÓN';
            return '';
        }

        // cálculo principal y renderizado
        function computeAndRender() {
            let maxVal = parseFloat(maxInput.value);
            let minVal = parseFloat(minInput.value);

            if (isNaN(maxVal) || isNaN(minVal) || maxVal <= minVal) {
                maxVal = 71312.32;
                minVal = 70293.38;
                maxInput.value = maxVal.toFixed(2);
                minInput.value = minVal.toFixed(2);
            }

            const diff = maxVal - minVal;

            // calcular niveles según dirección
            let levels = FIB_LEVELS.map(pct => {
                let value;
                if (currentDirection === 'BUY') {
                    value = minVal + (diff * pct / 100);
                } else { // SELL
                    value = maxVal - (diff * pct / 100);
                }
                return { pct, value };
            });

            currentLevels = levels.slice();
            selectedCards = []; // limpiar selección
            updateSelectedDisplay();

            // renderizar grid
            fiboGrid.innerHTML = '';
            levels.forEach((level, index) => {
                const card = document.createElement('div');
                card.className = 'fibo-card';
                card.dataset.index = index;
                card.dataset.pct = level.pct;
                card.dataset.value = level.value;

                card.innerHTML = `
                    <div class="fibo-label">${level.pct}%</div>
                    <div class="fibo-value">${level.value.toFixed(2)}</div>
                    <div class="zone-tag">${getZoneLabel(level.pct, currentDirection)}</div>
                `;

                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleSelectCard(index, card);
                });

                fiboGrid.appendChild(card);
            });

            // actualizar 50% y 61.8%
            let val50, val618;
            if (currentDirection === 'BUY') {
                val50 = minVal + (diff * 50 / 100);
                val618 = minVal + (diff * 61.8 / 100);
            } else {
                val50 = maxVal - (diff * 50 / 100);
                val618 = maxVal - (diff * 61.8 / 100);
            }
            price50.innerText = `50% ${val50.toFixed(2)}`;
            price618.innerText = `61.8% ${val618.toFixed(2)}`;

            // limpiar recursivos
            recursiveLevelsDiv.innerHTML = '';
        }

        // selección de cards (máx 2)
        function toggleSelectCard(index, cardElement) {
            const alreadySelected = selectedCards.includes(index);

            if (alreadySelected) {
                selectedCards = selectedCards.filter(i => i !== index);
                cardElement.classList.remove('selected');
            } else {
                if (selectedCards.length >= 2) {
                    const oldestIndex = selectedCards.shift();
                    const oldestCard = document.querySelector(`.fibo-card[data-index="${oldestIndex}"]`);
                    if (oldestCard) oldestCard.classList.remove('selected');
                }
                selectedCards.push(index);
                cardElement.classList.add('selected');
            }
            updateSelectedDisplay();
        }

        function updateSelectedDisplay() {
            if (selectedCards.length === 0) {
                selectedFirst.innerText = '—';
                selectedSecond.innerText = '—';
                return;
            }
            const firstIdx = selectedCards[0];
            const firstLevel = currentLevels[firstIdx];
            selectedFirst.innerText = firstLevel ? `${firstLevel.pct}%  ${firstLevel.value.toFixed(2)}` : '—';

            if (selectedCards.length >= 2) {
                const secondIdx = selectedCards[1];
                const secondLevel = currentLevels[secondIdx];
                selectedSecond.innerText = secondLevel ? `${secondLevel.pct}%  ${secondLevel.value.toFixed(2)}` : '—';
            } else {
                selectedSecond.innerText = '—';
            }
        }

        // aplicar nuevo fibonacci desde selección
        function applyNewFibonacci() {
            if (selectedCards.length < 2) {
                alert('⚡ Selecciona DOS niveles (máximo y mínimo)');
                return;
            }

            const idx1 = selectedCards[0];
            const idx2 = selectedCards[1];
            const level1 = currentLevels[idx1];
            const level2 = currentLevels[idx2];

            let newMax, newMin;
            if (level1.value > level2.value) {
                newMax = level1.value;
                newMin = level2.value;
            } else {
                newMax = level2.value;
                newMin = level1.value;
            }

            const diff = newMax - newMin;

            // generar nuevos niveles con la dirección actual
            const newLevels = FIB_LEVELS.map(pct => {
                let val;
                if (currentDirection === 'BUY') {
                    val = newMin + (diff * pct / 100);
                } else {
                    val = newMax - (diff * pct / 100);
                }
                return { pct, value: val };
            });

            // mostrar
            recursiveLevelsDiv.innerHTML = '';

            // tarjetas de nuevo max y min
            const maxCard = document.createElement('div');
            maxCard.className = 'result-card';
            maxCard.style.borderColor = '#ff8888';
            maxCard.innerHTML = `<div style="font-weight:800">NUEVO MÁX</div><div style="font-size:2rem; color:white;">${newMax.toFixed(2)}</div>`;
            
            const minCard = document.createElement('div');
            minCard.className = 'result-card';
            minCard.style.borderColor = '#8888ff';
            minCard.innerHTML = `<div style="font-weight:800">NUEVO MÍN</div><div style="font-size:2rem; color:white;">${newMin.toFixed(2)}</div>`;

            recursiveLevelsDiv.appendChild(maxCard);
            recursiveLevelsDiv.appendChild(minCard);

            // niveles
            newLevels.forEach(level => {
                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `
                    <div style="color:#aaffff; font-weight:700;">${level.pct}%</div>
                    <div style="font-size:1.8rem; color:white; text-shadow:0 0 20px cyan;">${level.value.toFixed(2)}</div>
                    <div style="font-size:0.9rem; background:#003355; padding:5px; border-radius:20px; color:white;">${getZoneLabel(level.pct, currentDirection)}</div>
                `;
                recursiveLevelsDiv.appendChild(card);
            });
        }

        // eventos
        calcMain.addEventListener('click', (e) => {
            e.preventDefault();
            computeAndRender();
        });

        applyBtn.addEventListener('click', applyNewFibonacci);

        // inicializar
        window.addEventListener('load', () => {
            setDirection('SELL'); // activa SELL y compute
        });

        // scroll con arrastre (opcional para grid)
        // no necesario porque es grid responsivo, pero lo mantenemos para el contenedor si se desborda
    })();
</script>
</body>
</html>
