<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Heydin Kayser · Fibonacci Exacto</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 70% 30%, #0d1428, #02050c);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0.8rem;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background: rgba(5, 15, 25, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1.5px solid rgba(255, 80, 255, 0.4);
            border-radius: 2.5rem;
            padding: 1.5rem 1.2rem;
            box-shadow: 0 20px 50px rgba(255, 0, 255, 0.2), 0 0 0 1px rgba(0, 255, 255, 0.2) inset;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .title h1 {
            font-size: clamp(1.8rem, 6vw, 2.8rem);
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #ffccff, #ccccff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px #ff88ff, 0 0 15px cyan;
            letter-spacing: -0.02em;
        }

        .badge {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 0, 255, 0.5);
            border-radius: 40px;
            padding: 0.4rem 1.2rem;
            color: #fff;
            font-size: 0.9rem;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
        }

        .input-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            background: rgba(0, 15, 25, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 40px;
            padding: 1.2rem 1rem;
            margin-bottom: 1.8rem;
            align-items: center;
        }

        .input-group {
            flex: 1 1 160px;
            min-width: 130px;
        }

        .input-group label {
            display: block;
            color: #b0d0ff;
            font-size: 0.7rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 4px;
            text-shadow: 0 0 8px magenta;
        }

        .input-group input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1.5px solid rgba(255, 0, 255, 0.6);
            border-radius: 30px;
            padding: 12px 16px;
            font-size: 1.2rem;
            font-weight: 500;
            color: white;
            outline: none;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.3);
        }

        .direction-group {
            display: flex;
            gap: 5px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 40px;
            padding: 4px;
            border: 1px solid rgba(255, 0, 255, 0.6);
        }

        .dir-btn {
            background: transparent;
            border: none;
            border-radius: 40px;
            padding: 10px 20px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #ccc;
            cursor: pointer;
            transition: 0.15s;
        }

        .dir-btn.active {
            background: rgba(255, 70, 255, 0.4);
            color: white;
            text-shadow: 0 0 15px white;
            box-shadow: 0 0 30px #ff66ff;
            border: 1px solid white;
        }

        #btnBuy.active {
            background: rgba(0, 255, 200, 0.4);
            box-shadow: 0 0 30px cyan;
        }

        .calc-btn {
            background: rgba(255, 200, 0, 0.25);
            border: 2px solid rgba(255, 200, 0, 0.8);
            border-radius: 50px;
            padding: 10px 25px;
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 40px orange;
            cursor: pointer;
            min-width: 70px;
        }

        .signal-bar {
            background: rgba(20, 0, 30, 0.4);
            backdrop-filter: blur(16px);
            border: 1.5px solid rgba(255, 0, 200, 0.7);
            border-radius: 50px;
            padding: 1rem 1.5rem;
            margin: 1.5rem 0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            box-shadow: 0 0 40px rgba(255, 0, 255, 0.3);
        }

        .direction-large {
            font-size: clamp(1.4rem, 4vw, 2rem);
            font-weight: 700;
            background: rgba(0, 0, 0, 0.3);
            padding: 0.3rem 1.8rem;
            border-radius: 40px;
            border: 1px solid white;
            color: white;
            text-shadow: 0 0 20px magenta;
        }

        .key-levels {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .key-level {
            background: rgba(0, 20, 40, 0.6);
            backdrop-filter: blur(8px);
            border: 1.5px solid gold;
            border-radius: 40px;
            padding: 0.5rem 1.5rem;
            font-size: 1.1rem;
            color: white;
            font-weight: 500;
        }

        /* Grid principal - cuadrados más pequeños como solicitaste */
        .fibo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px;
            margin: 1.5rem 0;
        }

        .fibo-card {
            background: rgba(8, 20, 32, 0.5);
            backdrop-filter: blur(12px);
            border: 1.5px solid rgba(255, 0, 255, 0.5);
            border-radius: 20px;
            padding: 0.8rem 0.2rem;
            text-align: center;
            transition: 0.15s;
            cursor: pointer;
            box-shadow: 0 4px 0 rgba(0, 50, 70, 0.5);
            color: white;
        }

        .fibo-card.selected {
            border: 3px solid #ff44ff;
            background: rgba(40, 10, 50, 0.7);
            box-shadow: 0 0 40px #ff80ff, 0 4px 0 #880088;
            transform: scale(1.02);
        }

        .fibo-label {
            font-size: 0.9rem;
            font-weight: 600;
            background: rgba(0, 60, 100, 0.6);
            backdrop-filter: blur(4px);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            border: 1px solid cyan;
            color: white;
            margin-bottom: 4px;
        }

        .fibo-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: white !important;
            text-shadow: 0 0 15px cyan;
            margin: 4px 0;
            word-break: break-word;
        }

        .zone-tag {
            font-size: 0.7rem;
            background: rgba(30, 20, 40, 0.6);
            backdrop-filter: blur(4px);
            padding: 4px 8px;
            border-radius: 30px;
            border: 1px solid #ffaa00;
            color: #fff0c0;
            display: inline-block;
            font-weight: 500;
        }

        .selection-panel {
            background: rgba(10, 5, 20, 0.5);
            backdrop-filter: blur(16px);
            border: 2px solid rgba(255, 70, 255, 0.7);
            border-radius: 50px;
            padding: 1rem 1.2rem;
            margin: 1.5rem 0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .selected-display {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .selected-chip {
            background: rgba(0, 0, 0, 0.4);
            border: 1.5px solid cyan;
            border-radius: 40px;
            padding: 0.4rem 1.2rem;
            font-size: 0.9rem;
            color: white;
            font-weight: 500;
            backdrop-filter: blur(5px);
        }

        .apply-btn {
            background: rgba(200, 0, 255, 0.25);
            border: 2px solid #ff88ff;
            border-radius: 50px;
            padding: 0.5rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 40px magenta;
            cursor: pointer;
        }

        .recursive-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin: 1rem 0;
        }

        .recursive-card {
            background: rgba(8, 18, 35, 0.6);
            backdrop-filter: blur(12px);
            border: 1.5px solid rgba(0, 255, 255, 0.5);
            border-radius: 20px;
            padding: 0.8rem 0.2rem;
            text-align: center;
            color: white;
        }

        .footnote {
            text-align: center;
            color: #aac0dd;
            font-size: 0.8rem;
            margin-top: 2rem;
            border-top: 1px dashed rgba(255, 0, 255, 0.5);
            padding-top: 1rem;
        }

        @media (max-width: 480px) {
            .container { padding: 1rem 0.8rem; }
            .fibo-grid { grid-template-columns: repeat(3, 1fr); }
            .fibo-value { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="title">
            <h1>HEYDIN KAYSER</h1>
        </div>
        <div class="badge">FIBO · EXACT</div>
    </div>

    <div class="input-panel">
        <div class="input-group">
            <label>MAX</label>
            <input type="number" id="maxInput" step="0.01" value="73940.02">
        </div>
        <div class="input-group">
            <label>MIN</label>
            <input type="number" id="minInput" step="0.01" value="70297.96">
        </div>
        <div class="direction-group">
            <button class="dir-btn" id="btnBuy">BUY</button>
            <button class="dir-btn active" id="btnSell">SELL</button>
        </div>
        <button class="calc-btn" id="calcMain">⟳</button>
    </div>

    <div class="signal-bar">
        <div class="direction-large" id="mainDirection">SELL</div>
        <div class="key-levels">
            <div class="key-level" id="price50">50% 72126.05</div>
            <div class="key-level" id="price618">61.8% 71160.27</div>
        </div>
    </div>

    <div class="fibo-grid" id="fiboGrid"></div>

    <div class="selection-panel">
        <div class="selected-display">
            <div class="selected-chip" id="selectedFirst">—</div>
            <div class="selected-chip" id="selectedSecond">—</div>
        </div>
        <button class="apply-btn" id="applyBtn">🔄 NUEVA SECUENCIA</button>
    </div>

    <h3 style="color:white; margin: 1rem 0 0.5rem; font-weight:400; text-shadow:0 0 15px magenta;">nueva secuencia fibonacci</h3>
    <div class="recursive-grid" id="recursiveGrid"></div>

    <div class="footnote">
        ✦ cálculos exactos de Fibonacci · 0% = mínimo, 100% = máximo ✦
    </div>
</div>

<script>
    (function() {
        const FIB_LEVELS = [0, 23.6, 38.2, 50, 61.8, 75, 100, 161.8, 261.8];
        
        const maxInput = document.getElementById('maxInput');
        const minInput = document.getElementById('minInput');
        const btnBuy = document.getElementById('btnBuy');
        const btnSell = document.getElementById('btnSell');
        const calcMain = document.getElementById('calcMain');
        const fiboGrid = document.getElementById('fiboGrid');
        const selectedFirst = document.getElementById('selectedFirst');
        const selectedSecond = document.getElementById('selectedSecond');
        const applyBtn = document.getElementById('applyBtn');
        const recursiveGrid = document.getElementById('recursiveGrid');
        const mainDirection = document.getElementById('mainDirection');
        const price50 = document.getElementById('price50');
        const price618 = document.getElementById('price618');

        let currentDirection = 'SELL';
        let selectedIndices = [];
        let currentLevels = [];

        function setDirection(dir) {
            currentDirection = dir;
            if (dir === 'BUY') {
                btnBuy.classList.add('active');
                btnSell.classList.remove('active');
            } else {
                btnSell.classList.add('active');
                btnBuy.classList.remove('active');
            }
            mainDirection.innerText = dir;
            computeAndRender();
        }

        btnBuy.addEventListener('click', () => setDirection('BUY'));
        btnSell.addEventListener('click', () => setDirection('SELL'));

        function getZoneLabel(pct, dir) {
            if (pct === 50) return '⚖️ NEUTRAL';
            if (pct === 61.8) return dir === 'BUY' ? '🟢 ENTRADA BUY' : '🔻 ENTRADA SELL';
            if (pct === 38.2) return '⚠️ REBOTE';
            if (pct === 75) return '🧊 SOP/RES';
            if (pct === 23.6) return '🌊 INICIO';
            if (pct === 100) return '🎯 100%';
            if (pct === 161.8) return '🚀 EXTENSIÓN 161.8';
            if (pct === 261.8) return '🚀 EXTENSIÓN 261.8';
            return '';
        }

        function computeAndRender() {
            let maxVal = parseFloat(maxInput.value);
            let minVal = parseFloat(minInput.value);

            if (isNaN(maxVal) || isNaN(minVal) || maxVal <= minVal) {
                maxVal = 73940.02;
                minVal = 70297.96;
                maxInput.value = maxVal.toFixed(2);
                minInput.value = minVal.toFixed(2);
            }

            const diff = maxVal - minVal;

            let levels = FIB_LEVELS.map(pct => {
                let value;
                if (currentDirection === 'BUY') {
                    // Para BUY: desde mínimo hacia arriba
                    value = minVal + (diff * pct / 100);
                } else {
                    // Para SELL: desde máximo hacia abajo
                    value = maxVal - (diff * pct / 100);
                }
                return { pct, value };
            });

            currentLevels = levels.slice();
            selectedIndices = [];
            updateSelectedDisplay();

            fiboGrid.innerHTML = '';

            levels.forEach((level, idx) => {
                const card = document.createElement('div');
                card.className = 'fibo-card';
                card.dataset.index = idx;

                card.innerHTML = `
                    <div class="fibo-label">${level.pct}%</div>
                    <div class="fibo-value">${level.value.toFixed(2)}</div>
                    <div class="zone-tag">${getZoneLabel(level.pct, currentDirection)}</div>
                `;

                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleSelect(idx, card);
                });

                fiboGrid.appendChild(card);
            });

            // Actualizar precios 50% y 61.8% según dirección
            let v50, v618;
            if (currentDirection === 'BUY') {
                v50 = minVal + (diff * 50 / 100);
                v618 = minVal + (diff * 61.8 / 100);
            } else {
                v50 = maxVal - (diff * 50 / 100);
                v618 = maxVal - (diff * 61.8 / 100);
            }
            price50.innerText = `50% ${v50.toFixed(2)}`;
            price618.innerText = `61.8% ${v618.toFixed(2)}`;

            recursiveGrid.innerHTML = '';
        }

        function toggleSelect(index, cardElement) {
            if (selectedIndices.includes(index)) {
                selectedIndices = selectedIndices.filter(i => i !== index);
                cardElement.classList.remove('selected');
            } else {
                if (selectedIndices.length >= 2) {
                    const oldIdx = selectedIndices.shift();
                    const oldCard = document.querySelector(`.fibo-card[data-index="${oldIdx}"]`);
                    if (oldCard) oldCard.classList.remove('selected');
                }
                selectedIndices.push(index);
                cardElement.classList.add('selected');
            }
            updateSelectedDisplay();
        }

        function updateSelectedDisplay() {
            if (selectedIndices.length === 0) {
                selectedFirst.innerText = '—';
                selectedSecond.innerText = '—';
                return;
            }
            const first = currentLevels[selectedIndices[0]];
            selectedFirst.innerText = first ? `${first.pct}% ${first.value.toFixed(2)}` : '—';
            if (selectedIndices.length >= 2) {
                const second = currentLevels[selectedIndices[1]];
                selectedSecond.innerText = second ? `${second.pct}% ${second.value.toFixed(2)}` : '—';
            } else {
                selectedSecond.innerText = '—';
            }
        }

        function applyNewFibonacci() {
            if (selectedIndices.length < 2) {
                alert('selecciona dos niveles');
                return;
            }

            const l1 = currentLevels[selectedIndices[0]];
            const l2 = currentLevels[selectedIndices[1]];

            let newMax, newMin;
            if (l1.value > l2.value) {
                newMax = l1.value;
                newMin = l2.value;
            } else {
                newMax = l2.value;
                newMin = l1.value;
            }

            const diff = newMax - newMin;

            const newLevels = FIB_LEVELS.map(pct => {
                let val;
                if (currentDirection === 'BUY') {
                    val = newMin + (diff * pct / 100);
                } else {
                    val = newMax - (diff * pct / 100);
                }
                return { pct, value: val };
            });

            recursiveGrid.innerHTML = '';

            const maxCard = document.createElement('div');
            maxCard.className = 'recursive-card';
            maxCard.style.borderColor = '#ff8888';
            maxCard.innerHTML = `<div style="font-weight:600">NUEVO MÁX</div><div style="font-size:1.2rem">${newMax.toFixed(2)}</div>`;
            recursiveGrid.appendChild(maxCard);

            const minCard = document.createElement('div');
            minCard.className = 'recursive-card';
            minCard.style.borderColor = '#8888ff';
            minCard.innerHTML = `<div style="font-weight:600">NUEVO MÍN</div><div style="font-size:1.2rem">${newMin.toFixed(2)}</div>`;
            recursiveGrid.appendChild(minCard);

            newLevels.forEach(level => {
                const card = document.createElement('div');
                card.className = 'recursive-card';
                card.innerHTML = `
                    <div class="fibo-label" style="font-size:0.8rem; padding:3px 8px;">${level.pct}%</div>
                    <div style="font-size:1.2rem; font-weight:500; color:white; text-shadow:0 0 15px cyan;">${level.value.toFixed(2)}</div>
                    <div class="zone-tag" style="font-size:0.65rem;">${getZoneLabel(level.pct, currentDirection)}</div>
                `;
                recursiveGrid.appendChild(card);
            });
        }

        calcMain.addEventListener('click', (e) => {
            e.preventDefault();
            computeAndRender();
        });

        applyBtn.addEventListener('click', applyNewFibonacci);

        window.addEventListener('load', () => {
            setDirection('SELL');
        });
    })();
</script>
</body>
</html>
